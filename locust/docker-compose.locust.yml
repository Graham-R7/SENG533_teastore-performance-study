services:
  locust:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: teastore-locust
    working_dir: /app
    command:
      - locust
      - -f
      - /app/locustfile.py
      - --host
      - ${TEASTORE_HOST:-http://host.docker.internal:8080}
      - --web-port
      - "8089"
    ports:
      - "8089:8089"
    volumes:
      - ./:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
