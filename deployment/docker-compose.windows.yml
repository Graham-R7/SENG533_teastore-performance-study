version: "3"

services:

  registry:
    image: descartesresearch/teastore-registry
    ports:
      - "10000:8080"
    environment:
      - SERVICE_PORT=8080
      - HOST_NAME=registry

  db:
    image: descartesresearch/teastore-db
    ports:
      - "3307:3306"

  persistence:
    image: descartesresearch/teastore-persistence
    ports:
      - "1111:8080"
    environment:
      - REGISTRY_HOST=registry
      - REGISTRY_PORT=8080
      - SERVICE_PORT=8080
      - DB_HOST=db
      - DB_PORT=3306

  auth:
    image: descartesresearch/teastore-auth
    ports:
      - "2222:8080"
    environment:
      - REGISTRY_HOST=registry
      - REGISTRY_PORT=8080
      - SERVICE_PORT=8080

  recommender:
    image: descartesresearch/teastore-recommender
    ports:
      - "3333:8080"
    environment:
      - REGISTRY_HOST=registry
      - REGISTRY_PORT=8080
      - SERVICE_PORT=8080

  image:
    image: descartesresearch/teastore-image
    ports:
      - "4444:8080"
    environment:
      - REGISTRY_HOST=registry
      - REGISTRY_PORT=8080
      - SERVICE_PORT=8080

  webui:
    image: descartesresearch/teastore-webui
    ports:
      - "8080:8080"
    environment:
      - REGISTRY_HOST=registry
      - REGISTRY_PORT=8080
      - SERVICE_PORT=8080

# This docker file is meant for windows users. Delete the original docker and rename this one to docker-compose.yml then run docker compose -f deployment/docker-compose.yml down
# docker compose -f deployment/docker-compose.yml up -d
# Used port 3307 instead of 3306 because my current 3306 port is being used by mysql. 

